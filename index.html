<!DOCTYPE html>
<meta name="viewport" content="device=device-width, initial-scale=1.0">
<html>
<style>
  button {
    font-size: 15px;
    display: block;
    margin-bottom: 3px;
  }
  #start {
    position: fixed;
    left: calc(50% - 65px);
    bottom: 50px;
    font-size: 20px;
  }
  #pause {
    position: fixed;
    left: calc(50% - 10px);
    bottom: 50px;
    font-size: 20px;
  }
  #currentSong {
    position: fixed;
    bottom: 10px;
    left: 10px;
    text-align: center;
  }
  #search {
    margin-bottom: 3px;
  }
  #footer {
    position: fixed;
    left: 0px;
    bottom: 0px;
    width: 100%;
    height: 100px;
    background-color: rgb(180, 180, 180);
  }
  body {
    background-color: rgb(220, 220, 220);
  }
</style>
<body>
  <div id="footer"></div>
  <button id="start" onclick="start()">Play</button>
  <button id="pause" onclick="pause()">Pause</button>
  <div id="currentSong"></div>
  <input id="search" type="question">
  <input onclick="search()" type=submit>
  <div id="container"></div>
  <div id="ex"></div>
  <div><br><br><br><br> </div>
</body>
<script>
  var music = [];
  music[1] = "Poisoning_Pigeons_in_the_Park-Tom_Lehrer";
  music[2] = "Pollution-Tom_Lehrer";
  music[3] = "So_Long_Ma_a_song_for_World_War_3-Tom_Lehrer";
  music[4] = "Thats_Mathematics-Tom_Lehrer";
  music[5] = "The_Elements-Tom_Lehrer";
  music[6] = "We_Will_All_Go_Together_When_We_Go-Tom_Lehrer";
  music[7] = "Wernher_von_Braun-Tom_Lehrer";
  var order = [];
  for (let i = 1; i < music.length; i++) {
    let done = false;
    while (done == false) {
      let number = Math.ceil(Math.random() * (music.length - 1)) - 1;
      if (order[number] == null) {
        order[number] = i;
        done = true;
      }
    }
  }
  //document.getElementById("ex").innerHTML = order;
  var nowNumber = 0;
  var nowPlaying = new Audio(music[order[nowNumber]] + ".mp3");

  function start() {
    nowPlaying.play();
    document.getElementById("currentSong").innerHTML = music[order[nowNumber]].replaceAll("_", " ");
  }

  function pause() {
    nowPlaying.pause();
  }

  nowPlaying.addEventListener("ended", playNextSong);
  function playNextSong() {
    nowNumber++;
    nowPlaying = new Audio(music[order[nowNumber]] + ".mp3");
    nowPlaying.play();
    nowPlaying.addEventListener("ended", playNextSong);
    document.getElementById("currentSong").innerHTML = music[order[nowNumber]].replaceAll("_", " ");
  }

  function search() {
    const search = document.getElementById("search").value;
    for (let i = 1; i < music.length; i++) {
      if (music[i].search(search) == -1) {
        document.getElementById(i).style.display = "none";
      } else {
        document.getElementById(i).style.display = "";
      }
    }
  }

  //music buttons
  for (let i = 0; i < music.length; i++) {
    if (music[i] == null) {
      continue;
    }
    const button = document.createElement("button");
    const text = music[i].replaceAll("_", " ");
    button.innerHTML = text;
    button.id = i;
    document.getElementById("container").appendChild(button);
  }
</script>
</html>
