<style>
  button {
    font-size: 15px;
    display: block;
    margin-bottom: 3px;
  }
  button:active {
    background-color: rgb(150, 150, 150);
  }
  input:active {
    background-color: rgb(150, 150, 150);
  }
  #start {
    position: fixed;
    left: calc(50% - 65px);
    bottom: 50px;
    font-size: 20px;
  }
  #pause {
    position: fixed;
    left: calc(50% - 10px);
    bottom: 50px;
    font-size: 20px;
  }
  #random {
    position: fixed;
    left: calc(50% - 150px);
    bottom: 50px;
    font-size: 20px;
  }
  #currentSong {
    position: fixed;
    bottom: 10px;
    left: 10px;
    text-align: center;
  }
  #search {
    margin-bottom: 3px;
  }
  #footer {
    position: fixed;
    left: 0px;
    bottom: 0px;
    width: 100%;
    height: 100px;
    background-color: rgb(180, 180, 180);
  }
  body {
    background-color: rgb(220, 220, 220);
  }
</style>
<body>
  <div id="footer"></div>
  <button id="start" onclick="start()">Play</button>
  <button id="pause" onclick="pause()">Pause</button>
  <button id="random" onclick="random()"><---</button>
  <div id="currentSong"></div>
  <input id="search" type="question">
  <input onclick="search()" type=submit>
  <div id="container"></div>
  <div id="ex"></div>
  <div><br><br><br><br><br><br> </div>
</body>
<script>
  musicVariable();
  var order = [];
  for (let i = 1; i < music.length; i++) {
    let done = false;
    while (done == false) {
      let number = Math.ceil(Math.random() * (music.length - 1)) - 1;
      if (order[number] == null) {
        order[number] = i;
        done = true;
      }
    }
  }
  var humanOrder = [];
  var nowNumber = 0;
  var nowPlaying = new Audio(music[order[nowNumber]] + ".mp3");

  function start() {
    if (humanOrder.length > 0) {
      nowPlaying = new Audio(music[humanOrder[nowNumber]] + ".mp3");
      document.getElementById("currentSong").innerHTML = music[humanOrder[nowNumber]].replaceAll("_", " ");
    } else {
      document.getElementById("currentSong").innerHTML = music[order[nowNumber]].replaceAll("_", " ");
    }
    nowPlaying.play();
    nowPlaying.addEventListener("ended", playNextSong);
  }

  function pause() {
    nowPlaying.pause();
  }
  
  function playNextSong() {
    nowNumber++;
    if (humanOrder.length > 0) {
      nowPlaying = new Audio(music[humanOrder[nowNumber]] + ".mp3");
      document.getElementById("currentSong").innerHTML = music[humanOrder[nowNumber]].replaceAll("_", " ");
    } else {
      nowPlaying = new Audio(music[order[nowNumber]] + ".mp3");
      document.getElementById("currentSong").innerHTML = music[order[nowNumber]].replaceAll("_", " ");
    }
    nowPlaying.play();
    nowPlaying.addEventListener("ended", playNextSong);
  }

  function random() {
    humanOrder = [];
  }

  function search() {
    const search = document.getElementById("search").value.toLowerCase();
    for (let i = 1; i < music.length; i++) {
      const words = music[i].replaceAll("_", " ").toLowerCase();
      if (words.includes(search) == false) {
        document.getElementById(i).style.display = "none";
      } else {
        document.getElementById(i).style.display = "";
      }
    }
  }

  //music buttons
  for (let i = 0; i < music.length; i++) {
    if (music[i] == null) {
      continue;
    }
    const button = document.createElement("button");
    const text = music[i].replaceAll("_", " ");
    button.innerHTML = text;
    button.id = i;
    button.addEventListener("click", songClicked);
    document.getElementById("container").appendChild(button);
  }

  function songClicked(i) {
    humanOrder[humanOrder.length] = i.currentTarget.id;
    document.getElementById("ex").innerHTML = humanOrder;
  }
